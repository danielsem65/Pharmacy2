name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Install required SDK components
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1 || true

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ANDROID_HOME is: $ANDROID_HOME"

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip
          echo "GRADLE_HOME=${GITHUB_WORKSPACE}/gradle-8.7" >> $GITHUB_ENV
          echo "${GITHUB_WORKSPACE}/gradle-8.7/bin" >> $GITHUB_PATH

      - name: Check versions
        run: |
          echo "Java:"
          java -version 2>&1
          echo "Gradle:"
          gradle --version 2>&1
          echo "SDK:"
          echo "ANDROID_HOME=${ANDROID_HOME}"
          ls -la ${ANDROID_HOME}/platforms/ 2>&1 || true
          ls -la ${ANDROID_HOME}/build-tools/ 2>&1 || true

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PharmacyInventory-Debug
          path: app/build/outputs/apk/debug/*.apk
